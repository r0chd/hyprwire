name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  nix:
    strategy:
      matrix:
        package:
          - hyprwire
          - hyprwire-with-tests

    uses: hyprwm/actions/.github/workflows/nix.yml@main
    secrets: inherit
    with:
      command: nix build .#${{ matrix.package }} --print-build-logs
